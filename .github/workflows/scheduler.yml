name: Run Price Bot

# تغییر مهم: گوش دادن به دستور از راه دور (Cron-job.org) و اجرای دستی
on:
  repository_dispatch:
    types: [run-bot]  # نام رویداد باید با چیزی که در Cron-job.org می‌فرستیم یکی باشد
  
  workflow_dispatch:  # برای تست دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        BRS_API_KEY: ${{ secrets.BRS_API_KEY }}
      run: python bot.py
