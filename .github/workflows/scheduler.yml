name: Run Price Bot

on:
  schedule:
    # شنبه تا پنجشنبه: هر 5 دقیقه از 8 صبح تا 11 شب (به وقت ایران)
    # 8:00 ایران = 4:30 UTC | 23:00 ایران = 19:30 UTC
    # GitHub: 0=یکشنبه، 6=شنبه | پس 0-4,6 = یکشنبه تا پنجشنبه + شنبه
    - cron: '*/5 4-19 * * 0-4,6'
  
  workflow_dispatch:  # اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        BRS_API_KEY: ${{ secrets.BRS_API_KEY }}
      run: python bot.py
